name: Deploy Client (Nutry Bites)

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-client.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Nutry Bites (client) to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.REPO_PATH || '~/nutry-bites' }}
            echo "📥 Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            cd client
            echo "🧹 Cleaning old build and cache..."
            rm -rf .next
            
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps
            
            echo "🏗 Building application..."
            npm run build
            
            echo "🔄 Restarting PM2 process..."
            pm2 restart nutry-client --update-env || pm2 start npm --name "nutry-client" -- start
            echo "✅ Deployment successful!"

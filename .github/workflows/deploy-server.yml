name: Deploy Server (Nutry Bites API)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Nutry Bites (server) to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.REPO_PATH || '~/nutry-bites' }}
            echo "📥 Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            cd server
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps
            
            echo "🏗 Generating Prisma Client..."
            npx prisma generate
            
            echo "🗄 Syncing Database Schema (Safe Mode)..."
            # db push is used here to ensure the database schema matches the prisma schema 
            # without resetting data or requiring a clean migration history.
            # It will automatically fail if it detects potential data loss.
            npx prisma db push --skip-generate

            echo "⚙️ Synchronizing Site Settings Content..."
            # This ensures your new contact details and FSSAI are updated in the DB
            node -r dotenv/config --experimental-json-modules scripts/sync-site-settings.js
            
            echo "🔄 Restarting PM2 process..."
            # Adjust the name 'nutry-server' if your PM2 process has a different name
            pm2 restart nutry-server --update-env || pm2 start index.js --name "nutry-server"
            
            echo "✅ Server Deployment successful!"
